name: CI/CD pipeline for LassoCV regression

on:
  push:
    branches:
        - main
  pull_request:
    branches:
        - main

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
          - name: checkout code
            uses: actions/checkout@v3

          - name: setup python
            uses: actions/setup-python@v4
            with:
                python-version: "3.11"

          - name: install dependencies
            run: |
              python -m pip install --upgrade pip
              pip instal -r requirements.txt

          - name: tests
            run: |
              python -c "import joblib; import fastapi as FastAPI; 
              print('All import successfully')"